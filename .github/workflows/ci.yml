name: CI / CD Pipeline

on:
  push:
    branches:
      - development
  pull_request:
    branches:
      - main

# Cancel in-progress runs for the same branch/PR so we never queue up stale
# jobs after a rapid series of pushes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Type-check
        run: bun run --bun tsc --noEmit

      - name: Lint
        run: bun run lint

      - name: Run tests
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY || 'ci_dummy_key' }}
          BETTER_AUTH_SECRET: ${{ secrets.BETTER_AUTH_SECRET || 'ci_dummy_secret' }}
        run: bun run test

  # Auto PR on "push" events
  open-pr:
    name: Open Pull Request → main
    runs-on: ubuntu-latest
    needs: quality
    if: github.event_name == 'push'

    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create or update pull request
        uses: peter-evans/create-pull-request@v7
        with:
          base: main
          branch: ${{ github.ref_name }}
          title: "chore: promote ${{ github.ref_name }} → main (${{ github.sha }})"
          body: |
            ## Automated Pull Request

            This PR was opened automatically after the CI quality gate passed on `${{ github.ref_name }}`.

            ### What's included
            - Branch: `${{ github.ref_name }}`
            - Commit: `${{ github.sha }}`
            - Triggered by: @${{ github.actor }}

            ### Checklist
            - [x] Lint passed
            - [x] Type-check passed
            - [x] Unit tests passed
            - [ ] Manual review completed
          labels: automated-pr
          draft: false
